name: Keep Awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake API
        run: curl -sS --max-time 30 https://live-fraud-detection-agent.onrender.com/

      - name: Wake Dashboard
        run: curl -sS --max-time 30 https://mhmdxch-fraud-dashboard.hf.space/
