name: Keep Render Warm

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://live-fraud-detection-agent.onrender.com/)
          echo "API responded with $CODE"
          [ "$CODE" = "200" ] || exit 1
      - name: Ping Dashboard
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://live-fraud-detection-agent-1.onrender.com/)
          echo "Dashboard responded with $CODE"
          [ "$CODE" = "200" ] || exit 1
