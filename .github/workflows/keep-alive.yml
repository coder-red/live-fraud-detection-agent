name: Keep Render Warm

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API
        run: curl -s -o /dev/null -w "%{http_code}" https://live-fraud-detection-agent.onrender.com/
      - name: Ping Dashboard
        run: curl -s -o /dev/null -w "%{http_code}" https://live-fraud-detection-agent-1.onrender.com/
