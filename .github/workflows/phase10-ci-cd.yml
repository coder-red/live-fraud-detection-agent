name: Phase 10 CI/CD

on:
  # Run the workflow whenever code lands on main or someone opens a PR.
  push:
    branches:
      - main
  pull_request:
  # Allow manual runs from the GitHub Actions tab.
  workflow_dispatch:
    inputs:
      run_langsmith_eval:
        # Optional manual switch so we only hit LangSmith when we really want to.
        description: "Run the LangSmith eval job after tests and build"
        type: boolean
        default: false

jobs:
  lint:
    name: Lint with Ruff
    runs-on: ubuntu-latest

    steps:
      # Pull the repo into the runner so Ruff can inspect the source files.
      - name: Check out repository
        uses: actions/checkout@v4

      # Set up the same Python version we use elsewhere in CI.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Install uv so the runner can recreate the locked environment.
      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      # Sync dev dependencies, including Ruff.
      - name: Sync dependencies
        run: uv sync --frozen --group dev

      # Ruff checks for syntax, imports, and style problems quickly.
      - name: Run Ruff
        run: uv run ruff check .

  test:
    name: Tests and checks
    runs-on: ubuntu-latest
    needs: lint

    steps:
      # Pull the repo into the runner so the workflow can read the project files.
      # A runner is the computer that actually executes the workflow commands.
      # A job is a grouped set of steps that run on the same runner.
      # A workflow can have multiple jobs, and they can run sequentially or in parallel.
      # Checkout means download the repository code onto the runner.
      - name: Check out repository
        uses: actions/checkout@v4

      # Set up the Python version this project targets.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Install uv, which is the project's dependency manager / runner.
      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      # Recreate the environment from uv.lock so CI matches local development.
      - name: Sync dependencies
        run: uv sync --frozen --group dev

      # Run the test suite through uv so it uses the synced environment.
      - name: Run test suite
        run: uv run pytest tests

      # Quick syntax-level check that imports and Python files compile.
      - name: Compile Python files
        run: uv run python -m compileall app agents evals scripts src tests

  security-scan:
    name: Dependency security scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      # Pull the repo into the runner so pip-audit can read the lockfile and metadata.
      - name: Check out repository
        uses: actions/checkout@v4

      # Set up the same Python version used for the rest of CI.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Install uv so we can recreate the locked environment.
      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      # Sync dependencies so pip-audit scans the same package set we ship.
      - name: Sync dependencies
        run: uv sync --frozen --group dev

      # Fail the workflow if a known vulnerable dependency is present.
      - name: Run pip-audit
        run: uv run pip-audit

  docker-build:
    name: Docker build validation
    runs-on: ubuntu-latest
    needs: [test, security-scan]

    steps:
      # Build only after tests pass, so we don't waste time packaging broken code.
      - name: Check out repository
        uses: actions/checkout@v4

      # Validate that the Dockerfile still builds cleanly.
      - name: Build Docker image
        run: docker build -t fraud-app:ci .

  langsmith-eval:
    name: LangSmith eval gate
    runs-on: ubuntu-latest
    needs: [lint, test, security-scan, docker-build]
    # Run automatically on main when the required secrets are present.
    # Keep the manual trigger as a fallback for ad-hoc evaluation runs.
    if: |
      (
        github.event_name == 'push' &&
        github.ref == 'refs/heads/main' &&
        secrets.LANGSMITH_API_KEY != '' &&
        secrets.GROQ_API_KEY != '' &&
        secrets.DATABASE_URL != ''
      ) ||
      (
        github.event_name == 'workflow_dispatch' &&
        inputs.run_langsmith_eval &&
        secrets.LANGSMITH_API_KEY != '' &&
        secrets.GROQ_API_KEY != '' &&
        secrets.DATABASE_URL != ''
      )

    env:
      # Secrets are injected at runtime, so they never live in the repo.
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      LANGCHAIN_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      LANGSMITH_PROJECT: fraud-phase10-ci
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      # Fetch the repo again because each job starts on a fresh runner.
      - name: Check out repository
        uses: actions/checkout@v4

      # Same Python setup as the test job.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Install uv again in this separate job.
      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      # Recreate the locked environment before running the eval script.
      - name: Sync dependencies
        run: uv sync --frozen --group dev

      # This blocks the pipeline if the eval fails or no reviewed cases are available.
      - name: Run LangSmith eval
        run: uv run python evals/langsmith_eval.py --limit 8
